name: lifemesh
description: "AI-powered offline social memory system"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  glassmorphism: ^3.0.0
  font_awesome_flutter: ^10.7.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  permission_handler: ^12.0.1
  get_storage: ^2.1.1
  image_picker: ^1.2.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  shimmer: ^3.0.0
  nearby_connections: ^4.3.0
  uuid: ^4.0.0
  connectivity_plus: ^5.0.0
  network_info_plus: ^8.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
